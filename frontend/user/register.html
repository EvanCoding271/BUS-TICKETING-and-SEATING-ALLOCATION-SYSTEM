<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Create Account | CityBus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="page-top">
        <div class="brand-panel">
          <span class="brand-icon"></span>
          <span class="brand-name">CityBus</span>
        </div>
      </div>
      <h1>Create Account</h1>
      <p>Sign in to your CityBus passenger account and start booking seats instantly.</p>
      
      <form id="registerForm" class="auth-form">
        <label>Full Name
          <input id="name" name="full_name" type="text" placeholder="Juan Dela Cruz" required />
        </label>
        <label>Email
          <input id="email" name="email" type="type" placeholder="juandelacruz@gmail.com" required />
        </label>
        <label>Phone Number
          <input id="phone" name="phone" type="tel" placeholder="09XX XXX XXXX" required />
        </label>
        <label>Password
          <input id="password" name="password" type="password" placeholder="Create a strong password" required />
        </label>
        <div class="auth-actions">
          <button type="submit" class="button button-primary">Sign up</button>
        </div>
      </form>
      <p class="auth-note">Already have an account? <a href="login.html">Sign In</a></p>
    </section>
  </main>

  <script type="module">
    import { apiFetch, showMessage } from '../js/app.js';

    // This selects the form directly, even if the ID is missing or mismatched!
    const signupForm = document.querySelector('form');

    if (signupForm) {
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // This reads the entire form data automatically based on input 'name' fields!
            const formData = new FormData(e.target);
            const name = formData.get('full_name');
            const email = formData.get('email');
            const phone = formData.get('phone');
            const password = formData.get('password');

            // Log the data locally so you can see it working in F12 Console
            console.log("Submitting registration for:", { name, email, phone });

            try {
                const data = await apiFetch('/api/auth/user/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password, phone })
                });
                
                showMessage('Registration successful! Please login.');
                window.location.href = '/user/login.html';
            } catch (err) {
                showMessage(err.message || 'Registration failed. Please check backend.');
            }
        });
    } else {
        console.error("Critical: Could not find any <form> element on this page!");
    }
  </script>
</body>
</html>
