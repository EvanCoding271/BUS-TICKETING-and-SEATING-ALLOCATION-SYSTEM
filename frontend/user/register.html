<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Create Account | CityBus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="page-top">
        <div class="brand-panel">
          <span class="brand-icon"></span>
          <span class="brand-name">CityBus</span>
        </div>
      </div>
      <h1>Create Account</h1>
      <p>Sign in to your CityBus passenger account and start booking seats instantly.</p>
      
      <form id="registerForm" class="auth-form">
        <label>Full Name
          <input id="name" name="full_name" type="text" placeholder="Juan Dela Cruz" required />
        </label>
        <label>Email
          <input id="email" name="email" type="email" placeholder="juandelacruz@gmail.com" required />
        </label>
        <label>Phone Number
          <input id="phone" name="phone" type="tel" placeholder="09XX XXX XXXX" required />
        </label>
        <label>Password
          <input id="password" name="password" type="password" placeholder="Create a strong password" required />
        </label>
        <div class="auth-actions">
          <button type="submit" class="button button-primary">Sign up</button>
        </div>
      </form>
      <p class="auth-note">Already have an account? <a href="login.html">Sign In</a></p>
    </section>
  </main>

  <script type="module">
    import { apiFetch, showMessage } from '../js/app.js';

    document.addEventListener('DOMContentLoaded', () => {
      const signupForm = document.getElementById('registerForm');

      if (!signupForm) {
        console.error('Register form not found on this page.');
        return;
      }

      signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(signupForm);
        const name = formData.get('full_name')?.toString().trim() || '';
        const email = formData.get('email')?.toString().trim() || '';
        const phone = formData.get('phone')?.toString().trim() || '';
        const password = formData.get('password')?.toString() || '';

        if (!name || !email || !phone || !password) {
          showMessage('Please complete all fields before signing up.');
          return;
        }

        try {
          await apiFetch('/api/auth/user/register', {
            method: 'POST',
            body: JSON.stringify({ full_name: name, email, password, phone })
          });

          showMessage('Registration successful! Please login.');
          window.location.href = 'login.html';
        } catch (err) {
          showMessage(err.message || 'Registration failed. Please try again.');
        }
      });
    });
  </script>
</body>
</html>
