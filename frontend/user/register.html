<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Create Account | CityBus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="page-top">
        <div class="brand-panel">
          <span class="brand-icon"></span>
          <span class="brand-name">CityBus</span>
        </div>
      </div>
      <h1>Create Account</h1>
      <p>Sign in to your CityBus passenger account and start booking seats instantly.</p>
      
      <form id="registerForm" class="auth-form">
        <label>Full Name
          <input id="name" name="full_name" type="text" placeholder="Juan Dela Cruz" required />
        </label>
        <label>Email
          <input id="email" name="email" type="type" placeholder="juandelacruz@gmail.com" required />
        </label>
        <label>Phone Number
          <input id="phone" name="phone" type="tel" placeholder="09XX XXX XXXX" required />
        </label>
        <label>Password
          <input id="password" name="password" type="password" placeholder="Create a strong password" required />
        </label>
        <div class="auth-actions">
          <button type="submit" class="button button-primary">Sign up</button>
        </div>
      </form>
      <p class="auth-note">Already have an account? <a href="login.html">Sign In</a></p>
    </section>
  </main>

  <script type="module">
    import { apiFetch, showMessage } from '../js/app.js';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Target the form element directly
        const form = e.target;
        
        // This extracts the values using the name="" attributes directly!
        const name = form.querySelector('input[name="full_name"]').value;
        const email = form.querySelector('input[name="email"]').value;
        const phone = form.querySelector('input[name="phone"]').value;
        const password = form.querySelector('input[name="password"]').value;

        try {
            const data = await apiFetch('/api/auth/user/register', {
                method: 'POST',
                body: JSON.stringify({ name, email, password, phone })
            });
            
            showMessage('Registration successful! Please login.');
            window.location.href = '/user/login.html';
        } catch (err) {
            showMessage(err.message);
        }
    });
  </script>
</body>
</html>
