<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Create Account | CityBus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="page-top">
        <div class="brand-panel">
          <span class="brand-icon"></span>
          <span class="brand-name">CityBus</span>
        </div>
      </div>
      <h1>Create Account</h1>
      <p>Sign in to your CityBus passenger account and start booking seats instantly.</p>
      
      <form id="registerForm" class="auth-form">
        <label>Full Name
          <input name="full_name" type="text" placeholder="Juan Dela Cruz" required />
        </label>
        <label>Email
          <input name="email" type="email" placeholder="juandelacruz@gmail.com" required />
        </label>
        <label>Phone Number
          <input name="phone" type="tel" placeholder="09XX XXX XXXX" required />
        </label>
        <label>Password
          <input name="password" type="password" placeholder="Create a strong password" required />
        </label>
        <div class="auth-actions">
          <button type="submit" class="button button-primary">Sign up</button>
        </div>
      </form>
      <p class="auth-note">Already have an account? <a href="login.html">Sign In</a></p>
    </section>
  </main>

  <script type="module">
    import { apiFetch, showMessage } from '../js/app.js';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Read form data directly by name attributes (bulletproof method)
        const formData = new FormData(e.target);
        const name = formData.get('full_name');
        const email = formData.get('email');
        const phone = formData.get('phone');
        const password = formData.get('password');

        try {
            const data = await apiFetch('/api/auth/user/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, phone })
            });
            
            alert('Registration successful! Redirecting to login...');
            window.location.href = './login.html';
        } catch (err) {
            alert(err.message || 'Registration failed.');
        }
    });
  </script>
</body>
</html>
