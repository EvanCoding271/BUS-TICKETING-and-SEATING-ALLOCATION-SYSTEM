<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Profile | CityBus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="profile-page">
  <div class="page-shell">
    <div class="page-top">
      <div>
        <p class="page-subtitle">Profile</p>
        <h1 class="page-title">Account Settings</h1>
      </div>
      <div class="page-toolbar">
        <a class="button button-secondary" href="dashboard.html">Dashboard</a>
      </div>
    </div>

    <div class="panel-grid">
      <section class="panel">
        <h2>Your Information</h2>
        <div class="form-field">
          <label>Full Name</label>
          <input type="text" value="Juan Dela Cruz" />
        </div>
        <div class="form-field">
          <label>Email Address</label>
          <input type="email" value="juandelacruz@gmail.com" />
        </div>
        <div class="form-field">
          <label>Phone Number</label>
          <input type="tel" value="09XX XXX XXXX" />
        </div>
        <div class="form-actions">
          <button class="button button-primary">Save Changes</button>
        </div>
      </section>
      <section class="panel">
        <h2>Membership</h2>
        <div class="list-card">
          <div class="list-item">
            <div>
              <strong>Member Since</strong>
              <p class="small-note">April 2026</p>
            </div>
          </div>
          <div class="list-item">
            <div>
              <strong>Account Type</strong>
              <p class="small-note">Passenger</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
